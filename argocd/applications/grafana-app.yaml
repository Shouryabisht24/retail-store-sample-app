apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-monitoring
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Shouryabisht24/retail-store-sample-app
    targetRevision: main
    path: argocd/monitoring

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true